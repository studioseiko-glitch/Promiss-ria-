<style>
:root{
  --bg:#0d0d0d;
  --bg2:#161616;
  --bg3:#1e1e1e;
  --bg4:#252525;
  --border:#2e2e2e;
  --border2:#3a3a3a;
  --text:#f0f0f0;
  --text2:#a0a0a0;
  --text3:#606060;
  --green:#00e87a;
  --green2:#00c468;
  --green-bg:rgba(0,232,122,0.08);
  --green-bg2:rgba(0,232,122,0.15);
  --amber:#ffb020;
  --amber-bg:rgba(255,176,32,0.08);
  --red:#ff4d4d;
  --red-bg:rgba(255,77,77,0.08);
  --blue:#4d9fff;
  --blue-bg:rgba(77,159,255,0.08);
  --radius:12px;
  --radius-sm:8px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:600px;margin:0 auto;position:relative}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px}
.logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase}
.btn-novo{background:var(--green);color:#000;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-novo:hover{background:var(--green2)}
.btn-ico{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius-sm);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-ico:hover{color:var(--green);border-color:var(--green)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;padding-bottom:72px}
.pane{display:none;padding:16px}
.pane.active{display:block}

/* NAV */
.nav{display:flex;flex-direction:row;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;font-size:11px;color:var(--text3);background:none;border:none;border-top:3px solid transparent;cursor:pointer;flex:1;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav-btn svg{width:22px;height:22px;transition:all .15s}
.nav-btn span{transition:all .15s}
.nav-btn.active{color:var(--green);border-top-color:var(--green)}
.nav-btn:hover:not(.active){color:var(--text2)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}

/* MÉTRICAS */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.metric-value{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.metric-value.green{color:var(--green)}
.metric-value.amber{color:var(--amber)}
.metric-value.red{color:var(--red)}

/* SALDO DESTAQUE */
.saldo-box{background:var(--green-bg2);border:1px solid rgba(0,232,122,0.3);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin:10px 0}
.saldo-box.quitado{background:rgba(0,232,122,0.05);border-color:rgba(0,232,122,0.2)}
.saldo-label{font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.saldo-valor{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--green)}
.saldo-sub{font-size:12px;color:var(--text2)}

/* INPUTS */
label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;margin-top:12px}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;padding:10px 12px;transition:border .15s;outline:none}
input:focus,select:focus{border-color:var(--green)}
input::placeholder{color:var(--text3)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
@media(max-width:400px){.form-grid{grid-template-columns:1fr}}

/* BUTTONS */
.btn{padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s}
.btn:hover{border-color:var(--text3)}
.btn-green{background:var(--green);color:#000;border-color:var(--green)}
.btn-green:hover{background:var(--green2)}
.btn-red{background:var(--red-bg);color:var(--red);border-color:rgba(255,77,77,0.3)}
.btn-full{width:100%;text-align:center}
.btns-row{display:flex;gap:8px;margin-top:14px}

/* CLIENTE ROW */
.cliente-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;cursor:pointer;transition:border .15s}
.cliente-card:hover{border-color:var(--border2)}
.cliente-card:active{border-color:var(--green)}
.cliente-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--green);flex-shrink:0;border:1px solid var(--border2)}
.cliente-nome{font-weight:500;font-size:15px}
.cliente-detalhe{font-size:12px;color:var(--text3)}
.cliente-footer{display:flex;gap:8px;margin-top:10px}

/* BADGE */
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;font-family:'Syne',sans-serif}
.badge-premium{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,232,122,0.2)}
.badge-ouro{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(255,176,32,0.2)}
.badge-atencao{background:rgba(255,140,0,0.08);color:#ff8c00;border:1px solid rgba(255,140,0,0.2)}
.badge-critico{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,77,77,0.2)}
.badge-quitado{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,232,122,0.2)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{padding-left:38px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}

/* PAGAMENTOS */
.pgto-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.pgto-item:last-child{border-bottom:none}
.pgto-data{color:var(--text2)}
.pgto-valor{color:var(--green);font-weight:500}
.pgto-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.pgto-del:hover{color:var(--red)}
.pgtos-lista{max-height:200px;overflow-y:auto}

/* RANKING */
.rank-grupo{margin-bottom:16px}
.rank-titulo{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-num{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text3);width:22px;text-align:center;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-nome{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-desc{font-size:12px;color:var(--text3)}
.rank-val{text-align:right;flex-shrink:0}
.rank-val-num{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.rank-val-label{font-size:11px;color:var(--text3)}

/* FINANCEIRO */
.chart-wrap{position:relative;width:100%;height:240px;margin:12px 0}
.fin-legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.fin-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.fin-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ALERTS */
.alerta{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:none}
.alerta-ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(0,232,122,0.2)}
.alerta-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,77,77,0.2)}

/* SECTION TITLE */
.sec-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text2);margin-bottom:12px}

/* EMPTY */
.empty{color:var(--text3);font-size:14px;text-align:center;padding:32px 0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:14px 0}

/* PAINEL PGTO highlight */
.pgto-destaque{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="15" x2="10" y2="15"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Promissória</div>
        <div class="logo-sub">Digital</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-ico" title="Exportar dados" onclick="exportarDados()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="btn-ico" title="Importar dados" onclick="document.getElementById('import-file').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importarDados(event)">
      <button class="btn-novo" onclick="abrirAba('cadastro');novoCliente()">+ Novo cliente</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- ABA CLIENTES -->
    <div id="pane-clientes" class="pane active">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="busca" placeholder="Buscar cliente…" oninput="filtrarClientes()">
      </div>
      <div id="lista-clientes"></div>
    </div>

    <!-- ABA CADASTRO -->
    <div id="pane-cadastro" class="pane">
      <div id="alerta-cad" class="alerta"></div>
      <div class="card">
        <div class="sec-title" id="titulo-form">Novo cliente</div>
        <div class="form-grid">
          <div style="grid-column:1/-1">
            <label>Nome completo *</label>
            <input id="c-nome" type="text" placeholder="João da Silva">
          </div>
          <div>
            <label>CPF</label>
            <input id="c-cpf" type="text" placeholder="000.000.000-00" oninput="fmtCPF(this)" maxlength="14">
          </div>
          <div>
            <label>Contato / WhatsApp</label>
            <input id="c-contato" type="tel" placeholder="(99) 99999-9999" oninput="fmtTel(this)" maxlength="15">
          </div>
          <div style="grid-column:1/-1">
            <label>Endereço</label>
            <input id="c-endereco" type="text" placeholder="Rua, número, bairro">
          </div>
          <div style="grid-column:1/-1">
            <label>Ponto de referência</label>
            <input id="c-referencia" type="text" placeholder="Ex: Próximo ao mercado, casa amarela…">
          </div>
          <div>
            <label>Produto</label>
            <input id="c-produto" type="text" placeholder="Ex: Relógio">
          </div>
          <div>
            <label>Data da compra *</label>
            <input id="c-data" type="date">
          </div>
          <div>
            <label>Valor total (R$) *</label>
            <input id="c-total" type="tel" placeholder="0,00" oninput="fmtMoeda(this)">
          </div>
          <div>
            <label>Entrada (R$)</label>
            <input id="c-entrada" type="tel" placeholder="0,00" oninput="fmtMoeda(this)">
          </div>
        </div>
        <div class="btns-row">
          <button class="btn btn-green" onclick="salvarCliente()">Salvar</button>
          <button class="btn" onclick="limparForm()">Limpar</button>
        </div>
      </div>

      <!-- Painel de pagamentos -->
      <div id="painel-pgto" style="display:none">
        <div class="card">
          <div class="sec-title">Registrar pagamento</div>
          <div class="saldo-box" id="box-saldo">
            <div>
              <div class="saldo-label">Saldo restante</div>
              <div class="saldo-valor" id="saldo-valor">R$ 0,00</div>
            </div>
            <div style="text-align:right">
              <div class="saldo-sub" id="saldo-sub"></div>
            </div>
          </div>
          <div class="pgto-destaque">
            <div class="form-grid">
              <div>
                <label>Data</label>
                <input id="p-data" type="date">
              </div>
              <div>
                <label>Valor (R$)</label>
                <input id="p-valor" type="tel" placeholder="0,00" oninput="fmtMoeda(this)">
              </div>
            </div>
            <button class="btn btn-green btn-full" style="margin-top:12px" onclick="addPgto()">Registrar pagamento</button>
          </div>
          <div style="margin-top:4px">
            <div class="sec-title">Histórico</div>
            <div class="pgtos-lista" id="lista-pgtos"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ABA RANKING -->
    <div id="pane-ranking" class="pane">
      <div class="metrics" id="rank-metrics"></div>
      <div id="rank-listas"></div>
    </div>

    <!-- ABA FINANCEIRO -->
    <div id="pane-financeiro" class="pane">
      <div class="metrics" id="fin-metrics"></div>
      <div class="card">
        <div class="sec-title">Recebido vs. A receber por cliente</div>
        <div class="chart-wrap"><canvas id="chart-bar" role="img" aria-label="Barras de valor pago e saldo por cliente"></canvas></div>
        <div class="fin-legend">
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:#00e87a"></div>Recebido</div>
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:#ffb020"></div>A receber</div>
        </div>
      </div>
      <div class="card">
        <div class="sec-title">Proporção geral</div>
        <div class="chart-wrap" style="height:200px"><canvas id="chart-donut" role="img" aria-label="Rosca: total recebido vs a receber"></canvas></div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-clientes" onclick="abrirAba('clientes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Clientes</span>
    </button>
    <button class="nav-btn" id="nav-cadastro" onclick="abrirAba('cadastro')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      <span>Cadastro</span>
    </button>
    <button class="nav-btn" id="nav-ranking" onclick="abrirAba('ranking')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      <span>Ranking</span>
    </button>
    <button class="nav-btn" id="nav-financeiro" onclick="abrirAba('financeiro')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Financeiro</span>
    </button>
  </nav>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const KEY = 'promissoria_v3';
let dados = [];
let editId = null;
let chartBar = null, chartDonut = null;

function salvar(){ localStorage.setItem(KEY, JSON.stringify(dados)); }
function carregar(){ try{ dados = JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ dados=[]; } }

function moeda(v){
  return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function parseMoeda(s){
  if(!s) return 0;
  return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;
}
function fmtMoeda(el){
  let v = el.value.replace(/\D/g,'');
  if(!v){el.value='';return;}
  el.value = (parseInt(v)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtCPF(el){
  let v = el.value.replace(/\D/g,'').substring(0,11);
  v = v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1-$2');
  el.value = v;
}
function fmtTel(el){
  let v=el.value.replace(/\D/g,'').substring(0,11);
  if(v.length<=2) v=v.replace(/^(\d{0,2})/,'($1');
  else if(v.length<=6) v=v.replace(/^(\d{2})(\d{0,4})/,'($1) $2');
  else if(v.length<=10) v=v.replace(/^(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3');
  else v=v.replace(/^(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
  el.value=v;
}
function fmtData(s){
  if(!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}
function calcSaldo(c){
  const pago = (c.pagamentos||[]).reduce((s,p)=>s+p.valor,0);
  const totalPago = (c.entrada||0)+pago;
  const restante = Math.max(0,(c.total||0)-totalPago);
  return {pago, totalPago, restante};
}
function classificar(c){
  const {restante}=calcSaldo(c);
  if(restante<=0.01) return 'quitado';
  const pgtos=c.pagamentos||[];
  if(!pgtos.length){
    const d=Math.floor((Date.now()-new Date(c.data+'T12:00').getTime())/86400000);
    return d>120?'critico':'atencao';
  }
  const ultimo=pgtos.reduce((a,b)=>new Date(a.data)>new Date(b.data)?a:b);
  const dias=Math.floor((Date.now()-new Date(ultimo.data+'T12:00').getTime())/86400000);
  if(dias<=30) return 'premium';
  if(dias<=90) return 'ouro';
  if(dias<=120) return 'atencao';
  return 'critico';
}
function badgeHTML(s){
  const lb={premium:'Premium ★',ouro:'Ouro',atencao:'Atenção',critico:'Crítico ⚠',quitado:'Quitado ✓'};
  return `<span class="badge badge-${s}">${lb[s]||s}</span>`;
}
function initiais(n){
  return (n||'?').split(' ').map(x=>x[0]).join('').substring(0,2).toUpperCase();
}

function alerta(msg,tipo,id='alerta-cad'){
  const el=document.getElementById(id);
  el.className=`alerta alerta-${tipo==='ok'?'ok':'err'}`;
  el.textContent=msg;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

function abrirAba(id){
  const tabs=['clientes','cadastro','ranking','financeiro'];
  tabs.forEach(t=>{
    document.getElementById('pane-'+t).classList.toggle('active',t===id);
    document.getElementById('nav-'+t).classList.toggle('active',t===id);
  });
  if(id==='clientes') renderClientes();
  if(id==='ranking') renderRanking();
  if(id==='financeiro') renderFinanceiro();
}

function novoCliente(){
  editId=null;
  limparForm();
  document.getElementById('c-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('titulo-form').textContent='Novo cliente';
  document.getElementById('painel-pgto').style.display='none';
}
function limparForm(){
  ['c-nome','c-cpf','c-contato','c-endereco','c-referencia','c-produto','c-total','c-entrada','c-data'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('alerta-cad').style.display='none';
  document.getElementById('painel-pgto').style.display='none';
  editId=null;
}

function exportarDados(){
  if(!dados.length){alert('Nenhum dado para exportar!');return;}
  const json = JSON.stringify(dados, null, 2);
  const blob = new Blob([json],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  a.href=url; a.download='promissoria-backup-'+hoje+'.json';
  a.click(); URL.revokeObjectURL(url);
}
function importarDados(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const importado = JSON.parse(ev.target.result);
      if(!Array.isArray(importado)) throw new Error();
      if(!confirm('Importar '+importado.length+' cliente(s)? Os dados atuais serão substituídos.')) return;
      dados = importado;
      salvar();
      renderClientes();
      abrirAba('clientes');
      alert('✓ '+importado.length+' cliente(s) importado(s) com sucesso!');
    }catch(err){
      alert('Arquivo inválido. Use apenas backups gerados por este app.');
    }
    e.target.value='';
  };
  reader.readAsText(file);
}
function salvarCliente(){
  const nome=document.getElementById('c-nome').value.trim();
  const data=document.getElementById('c-data').value;
  const total=parseMoeda(document.getElementById('c-total').value);
  if(!nome||!data||!total){alerta('Preencha nome, data e valor total.','err');return;}
  const obj={
    nome, cpf:document.getElementById('c-cpf').value,
    contato:document.getElementById('c-contato').value,
    endereco:document.getElementById('c-endereco').value,
    referencia:document.getElementById('c-referencia').value,
    produto:document.getElementById('c-produto').value,
    data, total, entrada:parseMoeda(document.getElementById('c-entrada').value)
  };
  if(editId){
    const idx=dados.findIndex(c=>c.id===editId);
    if(idx>=0){ obj.id=editId; obj.pagamentos=dados[idx].pagamentos||[]; dados[idx]=obj; }
    alerta('Cliente atualizado!','ok');
  }else{
    obj.id=Date.now()+''; obj.pagamentos=[];
    dados.push(obj); editId=obj.id;
    alerta('Salvo! Registre os pagamentos abaixo.','ok');
  }
  salvar();
  document.getElementById('titulo-form').textContent='Editar: '+nome;
  document.getElementById('painel-pgto').style.display='block';
  atualizarPainelPgto();
}

function editarCliente(id){
  const c=dados.find(x=>x.id===id); if(!c) return;
  editId=id;
  document.getElementById('c-nome').value=c.nome||'';
  document.getElementById('c-cpf').value=c.cpf||'';
  document.getElementById('c-contato').value=c.contato||'';
  document.getElementById('c-endereco').value=c.endereco||'';
  document.getElementById('c-referencia').value=c.referencia||'';
  document.getElementById('c-produto').value=c.produto||'';
  document.getElementById('c-data').value=c.data||'';
  document.getElementById('c-total').value=c.total?(c.total).toLocaleString('pt-BR',{minimumFractionDigits:2}):'';
  document.getElementById('c-entrada').value=c.entrada?(c.entrada).toLocaleString('pt-BR',{minimumFractionDigits:2}):'';
  document.getElementById('titulo-form').textContent='Editar: '+c.nome;
  document.getElementById('painel-pgto').style.display='block';
  document.getElementById('p-data').value=new Date().toISOString().split('T')[0];
  abrirAba('cadastro');
  atualizarPainelPgto();
  window.scrollTo(0,0);
}

function excluirCliente(id){
  if(!confirm('Excluir este cliente e todos os pagamentos?')) return;
  dados=dados.filter(c=>c.id!==id); salvar(); renderClientes();
}

function atualizarPainelPgto(){
  if(!editId) return;
  const c=dados.find(x=>x.id===editId); if(!c) return;
  const {restante,totalPago}=calcSaldo(c);
  const box=document.getElementById('box-saldo');
  if(restante<=0.01){
    box.className='saldo-box quitado';
    document.getElementById('saldo-valor').textContent='QUITADO ✓';
    document.getElementById('saldo-sub').textContent='Dívida quitada!';
  }else{
    box.className='saldo-box';
    document.getElementById('saldo-valor').textContent=moeda(restante);
    document.getElementById('saldo-sub').textContent='Pago: '+moeda(totalPago)+' / '+moeda(c.total);
  }
  const pgtos=c.pagamentos||[];
  const lista=document.getElementById('lista-pgtos');
  if(!pgtos.length){lista.innerHTML='<div class="empty">Nenhum pagamento registrado</div>';return;}
  lista.innerHTML=[...pgtos].reverse().map((p,ri)=>{
    const i=pgtos.length-1-ri;
    return `<div class="pgto-item">
      <span class="pgto-data">${fmtData(p.data)}</span>
      <span class="pgto-valor">${moeda(p.valor)}</span>
      <button class="pgto-del" onclick="delPgto('${c.id}',${i})">✕</button>
    </div>`;
  }).join('');
}

function addPgto(){
  if(!editId){alerta('Salve o cliente primeiro.','err');return;}
  const data=document.getElementById('p-data').value;
  const valor=parseMoeda(document.getElementById('p-valor').value);
  if(!data||!valor){alerta('Informe data e valor.','err');return;}
  const c=dados.find(x=>x.id===editId); if(!c) return;
  const {restante}=calcSaldo(c);
  if(valor>restante+0.01){alerta('Valor maior que o saldo de '+moeda(restante)+'.','err');return;}
  c.pagamentos.push({data,valor});
  c.pagamentos.sort((a,b)=>new Date(a.data)-new Date(b.data));
  document.getElementById('p-valor').value='';
  salvar(); atualizarPainelPgto(); alerta('Pagamento registrado!','ok');
}

function delPgto(cid,idx){
  const c=dados.find(x=>x.id===cid); if(!c) return;
  if(!confirm('Remover este pagamento?')) return;
  c.pagamentos.splice(idx,1); salvar(); atualizarPainelPgto();
}

function filtrarClientes(){ renderClientes(document.getElementById('busca').value.toLowerCase()); }

function renderClientes(filtro=''){
  const cont=document.getElementById('lista-clientes');
  const lista=filtro?dados.filter(c=>c.nome.toLowerCase().includes(filtro)):dados;
  if(!lista.length){
    cont.innerHTML=`<div class="empty">${filtro?'Nenhum cliente encontrado':'Nenhum cliente cadastrado ainda'}</div>`;
    return;
  }
  cont.innerHTML=lista.map(c=>{
    const {restante,totalPago}=calcSaldo(c);
    const st=classificar(c);
    return `<div class="cliente-card">
      <div class="cliente-header">
        <div class="avatar">${initiais(c.nome)}</div>
        <div style="flex:1;min-width:0">
          <div class="cliente-nome">${c.nome}</div>
          <div class="cliente-detalhe">${c.produto||'—'} &nbsp;·&nbsp; ${fmtData(c.data)}</div>
        </div>
        ${badgeHTML(st)}
      </div>
      ${restante>0.01
        ?`<div class="saldo-box"><div><div class="saldo-label">Saldo restante</div><div class="saldo-valor">${moeda(restante)}</div></div><div style="text-align:right"><div class="saldo-sub">Pago: ${moeda(totalPago)}</div><div class="saldo-sub">Total: ${moeda(c.total)}</div></div></div>`
        :`<div class="saldo-box quitado"><div><div class="saldo-label">Dívida quitada</div><div class="saldo-valor">✓ ${moeda(c.total)}</div></div></div>`
      }
      <div class="cliente-footer">
        <button class="btn" style="flex:1;font-size:13px" onclick="editarCliente('${c.id}')">Editar / Pagar</button>
        <button class="btn btn-red" style="font-size:13px" onclick="excluirCliente('${c.id}')">Excluir</button>
      </div>
    </div>`;
  }).join('');
}

function renderRanking(){
  const grupos={premium:[],ouro:[],atencao:[],critico:[],quitado:[]};
  dados.forEach(c=>grupos[classificar(c)].push(c));
  document.getElementById('rank-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Premium</div><div class="metric-value green">${grupos.premium.length}</div></div>
    <div class="metric"><div class="metric-label">Ouro</div><div class="metric-value amber">${grupos.ouro.length}</div></div>
    <div class="metric"><div class="metric-label">Atenção</div><div class="metric-value" style="color:#ff8c00">${grupos.atencao.length}</div></div>
    <div class="metric"><div class="metric-label">Crítico</div><div class="metric-value red">${grupos.critico.length}</div></div>`;
  const ordem=[
    ['premium','Premium — pagando em dia'],
    ['ouro','Ouro — pequeno atraso'],
    ['atencao','Atenção — 90 a 120 dias'],
    ['critico','Crítico — mais de 120 dias'],
    ['quitado','Quitados']
  ];
  document.getElementById('rank-listas').innerHTML=ordem.map(([k,titulo])=>{
    if(!grupos[k].length) return '';
    return `<div class="card rank-grupo">
      <div class="rank-titulo">${titulo} ${badgeHTML(k)}</div>
      ${grupos[k].map((c,i)=>{
        const {restante}=calcSaldo(c);
        return `<div class="rank-item">
          <div class="rank-num">${i+1}</div>
          <div class="rank-info">
            <div class="rank-nome">${c.nome}</div>
            <div class="rank-desc">${c.produto||'—'}</div>
          </div>
          <div class="rank-val">
            <div class="rank-val-num" style="color:${k==='critico'?'var(--red)':k==='quitado'?'var(--green)':'var(--amber)'}">${moeda(restante>0.01?restante:c.total)}</div>
            <div class="rank-val-label">${restante>0.01?'restante':'quitado'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderFinanceiro(){
  let rec=0,aRec=0;
  dados.forEach(c=>{const {restante,totalPago}=calcSaldo(c);rec+=totalPago;aRec+=restante;});
  const total=rec+aRec;
  const pct=total>0?Math.round(rec/total*100):0;
  document.getElementById('fin-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Recebido</div><div class="metric-value green">${moeda(rec)}</div></div>
    <div class="metric"><div class="metric-label">A receber</div><div class="metric-value amber">${moeda(aRec)}</div></div>
    <div class="metric"><div class="metric-label">Total geral</div><div class="metric-value">${moeda(total)}</div></div>
    <div class="metric"><div class="metric-label">% recebido</div><div class="metric-value green">${pct}%</div></div>`;
  const top=dados.slice().sort((a,b)=>calcSaldo(b).totalPago-calcSaldo(a).totalPago).slice(0,8);
  if(chartBar) chartBar.destroy();
  chartBar=new Chart(document.getElementById('chart-bar'),{
    type:'bar',
    data:{
      labels:top.map(c=>c.nome.split(' ')[0]),
      datasets:[
        {label:'Recebido',data:top.map(c=>calcSaldo(c).totalPago),backgroundColor:'#00e87a',borderRadius:4},
        {label:'A receber',data:top.map(c=>calcSaldo(c).restante),backgroundColor:'#ffb020',borderRadius:4}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#606060',font:{size:12}},grid:{display:false}},
        y:{ticks:{color:'#606060',font:{size:11},callback:v=>'R$'+Number(v).toLocaleString('pt-BR')},grid:{color:'rgba(255,255,255,0.04)'}}
      }}
  });
  if(chartDonut) chartDonut.destroy();
  chartDonut=new Chart(document.getElementById('chart-donut'),{
    type:'doughnut',
    data:{labels:['Recebido','A receber'],datasets:[{data:[rec,aRec],backgroundColor:['#00e87a','#ffb020'],borderWidth:0,hoverBorderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false}}}
  });
}

carregar();
document.getElementById('p-data').value=new Date().toISOString().split('T')[0];
document.getElementById('c-data').value=new Date().toISOString().split('T')[0];
renderClientes();
</script>
</body>
</html>
